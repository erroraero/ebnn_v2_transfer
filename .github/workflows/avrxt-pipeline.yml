name: avrxt Pipeline Alerts

on:
  push:

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Send START alert
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🟡 Build Started\",
              \"description\": \"Pipeline execution has started\",
              \"color\": 16776960,
              \"fields\": [
                {\"name\": \"📁 Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                {\"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                {\"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                {\"name\": \"🔗 Commit\", \"value\": \"[View Commit](${{ github.event.head_commit.url }})\", \"inline\": false},
                {\"name\": \"⏱️ Time (IST)\", \"value\": \"${IST_TIME}\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"avrxt.git Monitoring System\"}
            }]
          }" ${{ secrets.DISCORD_WEBHOOK }}

  build:
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 👉 Add your real build/test steps here
      - name: Simulate Build
        run: |
          echo "Running build..."
          sleep 5

  notify-success:
    runs-on: ubuntu-latest
    needs: build
    if: success()
    steps:
      - name: Send SUCCESS alert
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🟢 Build Success\",
              \"description\": \"All checks passed successfully\",
              \"color\": 5763719,
              \"fields\": [
                {\"name\": \"📁 Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                {\"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                {\"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                {\"name\": \"📝 Commit\", \"value\": \"${{ github.event.head_commit.message }}\", \"inline\": false},
                {\"name\": \"🔗 Commit\", \"value\": \"[View Commit](${{ github.event.head_commit.url }})\", \"inline\": false},
                {\"name\": \"⏱️ Time (IST)\", \"value\": \"${IST_TIME}\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"avrxt.git Monitoring System\"}
            }]
          }" ${{ secrets.DISCORD_WEBHOOK }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    steps:
      - name: Send FAILURE alert
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"🔴 Build Failed\",
              \"description\": \"Pipeline execution failed — check logs\",
              \"color\": 15548997,
              \"fields\": [
                {\"name\": \"📁 Repo\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                {\"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                {\"name\": \"👤 Author\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                {\"name\": \"📝 Commit\", \"value\": \"${{ github.event.head_commit.message }}\", \"inline\": false},
                {\"name\": \"🔗 Commit\", \"value\": \"[View Commit](${{ github.event.head_commit.url }})\", \"inline\": false},
                {\"name\": \"⚠️ Action\", \"value\": \"Check GitHub Actions logs for errors\", \"inline\": false},
                {\"name\": \"⏱️ Time (IST)\", \"value\": \"${IST_TIME}\", \"inline\": false}
              ],
              \"footer\": {\"text\": \"avrxt.git Monitoring System\"}
            }]
          }" ${{ secrets.DISCORD_WEBHOOK }}
