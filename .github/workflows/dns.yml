name: EBN DNS Daily Log V3

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  dns-log:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsutils jq

      - name: Send Full DNS Snapshot to Discord
        run: |
          IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d %I:%M:%S %p IST")

          DOMAIN="ebnn.xyz"

          A=$(dig +short A $DOMAIN | tr '\n' ' ')
          AAAA=$(dig +short AAAA $DOMAIN | tr '\n' ' ')
          MX=$(dig +short MX $DOMAIN | tr '\n' ' ')
          NS=$(dig +short NS $DOMAIN | tr '\n' ' ')
          TXT=$(dig +short TXT $DOMAIN | head -n 2 | tr '\n' ' ')
          CNAME=$(dig +short CNAME $DOMAIN | tr '\n' ' ')
          SRV=$(dig +short SRV $DOMAIN | tr '\n' ' ')
          CAA=$(dig +short CAA $DOMAIN | tr '\n' ' ')
          PTR=$(dig +short PTR $DOMAIN | tr '\n' ' ')

          jq -n \
            --arg domain "$DOMAIN" \
            --arg time "$IST_TIME" \
            --arg a "$A" \
            --arg aaaa "$AAAA" \
            --arg mx "$MX" \
            --arg ns "$NS" \
            --arg txt "$TXT" \
            --arg cname "$CNAME" \
            --arg srv "$SRV" \
            --arg caa "$CAA" \
            --arg ptr "$PTR" \
            '{
              embeds: [
                {
                  title: "📊 Full DNS Snapshot",
                  description: "Complete DNS audit log (24h) for ebnn.xyz",
                  color: 5814783,
                  fields: [
                    {name: "🌐 Domain", value: $domain, inline: true},
                    {name: "⏱️ Time (IST)", value: $time, inline: true},

                    {name: "📡 A Record", value: ($a | if . == "" then "N/A" else . end), inline: false},
                    {name: "🌍 AAAA Record", value: ($aaaa | if . == "" then "N/A" else . end), inline: false},
                    {name: "📬 MX Record", value: ($mx | if . == "" then "N/A" else . end), inline: false},
                    {name: "🧭 NS Record", value: ($ns | if . == "" then "N/A" else . end), inline: false},
                    {name: "🧾 TXT Record", value: ($txt | if . == "" then "N/A" else . end), inline: false},

                    {name: "🔗 CNAME Record", value: ($cname | if . == "" then "N/A" else . end), inline: false},
                    {name: "🛰️ SRV Record", value: ($srv | if . == "" then "N/A" else . end), inline: false},
                    {name: "🔐 CAA Record", value: ($caa | if . == "" then "N/A" else . end), inline: false},
                    {name: "🔍 PTR Record", value: ($ptr | if . == "" then "N/A" else . end), inline: false}
                  ],
                  footer: {
                    text: "avrxt.git DNS Logging System • Full Audit Mode"
                  }
                }
              ]
            }' | curl -H "Content-Type: application/json" \
                      -X POST \
                      -d @- ${{ secrets.MONITOR_DC_HOOK }}
